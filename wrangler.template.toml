# Copy this file to wrangler.toml (or wrangler.local.toml) for a new deployment.
# Keep production IDs and secrets out of public forks.

name = "ride"
main = "api/worker.js"
compatibility_date = "2024-01-01"
workers_dev = false
routes = ["your-domain.example.com/*"]

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "RIDE_TRIP_PLANNER_DB"
database_name = "ride-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "RIDE_TRIP_PLANNER_SESSIONS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "RIDE_TRIP_PLANNER_ATTACHMENTS"
bucket_name = "ride-attachments"

[vars]
ENVIRONMENT = "production"
BASE_URL = "https://your-domain.example.com"
