<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Ride — Social Sharing Card (OG Image)
    1200x630 optimized for Twitter/Facebook/LinkedIn
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset=".35" stop-color="#1a1f4b"/>
      <stop offset=".65" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#0c1222"/>
    </linearGradient>

    <linearGradient id="pin" x1="540" y1="50" x2="660" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset=".5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>

    <radialGradient id="hl" cx="575" cy="130" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c7d2fe" stop-opacity=".35"/>
      <stop offset="1" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="dot" cx="600" cy="155" r="15" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset=".5" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </radialGradient>

    <radialGradient id="amb1" cx="600" cy="180" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1" stop-opacity=".08"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="amb2" cx="200" cy="100" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8" stop-opacity=".04"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="wg" x1="400" y1="360" x2="800" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0e7ff"/>
      <stop offset=".5" stop-color="#c7d2fe"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>

    <linearGradient id="ring" x1="570" y1="120" x2="630" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0e7ff" stop-opacity=".4"/>
      <stop offset="1" stop-color="#a5b4fc" stop-opacity=".2"/>
    </linearGradient>

    <filter id="bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="1 0 0 0 0  0 .85 0 0 0  0 0 .4 0 0  0 0 0 .6 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="lift">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity=".4"/>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&amp;display=swap');
  </style>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <ellipse cx="600" cy="180" rx="350" ry="280" fill="url(#amb1)"/>
  <ellipse cx="200" cy="100" rx="400" ry="350" fill="url(#amb2)"/>

  <!-- Decorative line (horizon) -->
  <line x1="300" y1="330" x2="900" y2="330" stroke="#a5b4fc" stroke-opacity=".06" stroke-width="1"/>

  <!-- Pin mark (scaled to ~0.55x of 512 master) -->
  <g filter="url(#lift)">
    <path d="M600 75 C637 75 667 105 667 140 C667 210 630 262 600 280 C570 262 533 210 533 140 C533 105 563 75 600 75Z"
          fill="url(#pin)"/>
    <path d="M600 75 C637 75 667 105 667 140 C667 210 630 262 600 280 C570 262 533 210 533 140 C533 105 563 75 600 75Z"
          fill="url(#hl)"/>
  </g>

  <!-- Pin edge rim -->
  <path d="M600 75 C637 75 667 105 667 140" fill="none" stroke="#c7d2fe" stroke-width="1" opacity=".15"/>
  <path d="M533 140 C533 105 563 75 600 75" fill="none" stroke="#c7d2fe" stroke-width="1" opacity=".15"/>

  <!-- Inner ring -->
  <circle cx="600" cy="150" r="32" fill="none" stroke="url(#ring)" stroke-width="2"/>

  <!-- Golden dot -->
  <circle cx="600" cy="150" r="10" fill="url(#dot)" filter="url(#bloom)"/>
  <circle cx="600" cy="150" r="3.5" fill="#fffbeb" opacity=".85"/>

  <!-- Wordmark: Ride -->
  <text x="600" y="420"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="96"
        font-weight="400"
        font-style="italic"
        fill="url(#wg)"
        text-anchor="middle"
        letter-spacing="0.06em">Ride</text>

  <!-- Tagline -->
  <text x="600" y="478"
        font-family="'Inter', system-ui, -apple-system, sans-serif"
        font-size="24"
        font-weight="300"
        fill="#a5b4fc"
        fill-opacity=".7"
        text-anchor="middle"
        letter-spacing="0.08em">Friendly open-source ride planning &amp; sharing</text>

  <!-- Domain -->
  <text x="600" y="575"
        font-family="'Inter', system-ui, -apple-system, sans-serif"
        font-size="18"
        font-weight="400"
        fill="#818cf8"
        fill-opacity=".4"
        text-anchor="middle"
        letter-spacing="0.12em">ride.incitat.io</text>
</svg>
