<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<meta name="theme-color" content="#0f172a" />
	<meta name="description" content="Friendly open-source ride planning and sharing app" />
	<meta property="og:type" content="website" />
	<meta property="og:site_name" content="Ride" />
	<meta property="og:title" content="Ride — Open Source Ride Planner" />
	<meta property="og:description" content="Friendly open-source ride planning and sharing app with waypoints, custom routes, journals, and collaborative trip links." />
	<meta property="og:url" content="https://ride.incitat.io/" />
	<meta property="og:image" content="https://ride.incitat.io/icons/og-ride.png" />
	<link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
	<link rel="icon" type="image/png" sizes="32x32" href="/icons/ride-logo-32.png" />
	<link rel="apple-touch-icon" href="/icons/icon-192.png" />
	<link rel="manifest" href="/manifest.json" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
	<script>
		(function () {
			if (typeof window === 'undefined') return;
			window.__rideFallbackMap = null;
			window.__rideMapBootstrapped = false;

			function bootFallbackMap() {
				if (window.__rideMapBootstrapped || !window.L) return;
				var el = document.getElementById('ride-map-canvas');
				if (!el || el.dataset.fallbackInit === '1') return;

				try {
					el.dataset.fallbackInit = '1';
					var map = window.L.map(el, {
						zoomControl: false,
						attributionControl: true
					}).setView([-34.5386, 146.5933], 6);
					window.L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
						attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
						maxZoom: 19,
						subdomains: 'abcd',
						detectRetina: true
					}).addTo(map);
					window.__rideFallbackMap = map;
					window.__rideMapBootstrapped = true;
				} catch (error) {
					console.warn('[Ride] Fallback map init failed:', error);
				}
			}

			window.addEventListener('load', function () {
				setTimeout(bootFallbackMap, 300);
				setTimeout(bootFallbackMap, 1200);
				setTimeout(bootFallbackMap, 2500);
			});
		})();
	</script>
	%sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
	<div id="app">%sveltekit.body%</div>
</body>
</html>
