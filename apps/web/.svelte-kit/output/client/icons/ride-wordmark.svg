<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140">
  <!--
    Ride — Serif Wordmark
    Font: Playfair Display Italic (Google Fonts, OFL)
    Fallback: Georgia → Times New Roman → serif
    Romantic high-contrast transitional serif with italic swash
  -->
  <defs>
    <linearGradient id="wg" x1="0" y1="20" x2="480" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e0e7ff"/>
      <stop offset=".45" stop-color="#c7d2fe"/>
      <stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>
    <filter id="ts" x="-.02" y="-.02" width="1.04" height="1.06">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#6366f1" flood-opacity=".2"/>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400&amp;display=swap');
  </style>

  <text x="240" y="105"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="108"
        font-weight="400"
        font-style="italic"
        fill="url(#wg)"
        text-anchor="middle"
        letter-spacing="0.06em"
        filter="url(#ts)">Ride</text>
</svg>
