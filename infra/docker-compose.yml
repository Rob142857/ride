services:
  osrm:
    image: osrm/osrm-backend:latest
    container_name: osrm
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./osrm-data:/data
    command: osrm-routed --algorithm mld --max-table-size 200 --max-trip-size 100 /data/data.osrm
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/nearest/v1/driving/151.2093,-33.8688"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 6G
